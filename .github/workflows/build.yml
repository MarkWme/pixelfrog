name: build

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  JFROG_BUILD_NAME: pixelfrog
  PYTHON_VERSION: "3.11"
  # Conan virtual = resolve/install; local = upload (virtual uploads need default deploy repo in Artifactory UI).
  CONAN_VIRTUAL_REPO_KEY: ${{ vars.JF_CONAN_VIRTUAL_REPO || 'mwpf-conan-virtual-dev' }}
  CONAN_LOCAL_REPO_KEY: ${{ vars.JF_CONAN_LOCAL_REPO || 'mwpf-conan-local-dev' }}

jobs:
  setup:
    name: setup
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Conan
        run: pip install "conan~=2.0"
      - name: Set up JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JF_OIDC_AUDIENCE }}
      - name: Verify JFrog and Conan
        run: |
          set -euo pipefail
          jf rt ping
          conan --version

  resolve-dependencies:
    name: resolve-dependencies
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Conan
        run: pip install "conan~=2.0"
      - name: Set up JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        id: jfrog
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JF_OIDC_AUDIENCE }}
      - name: Configure Conan remote
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
          OIDC_USER: ${{ steps.jfrog.outputs['oidc-user'] }}
          OIDC_TOKEN: ${{ steps.jfrog.outputs['oidc-token'] }}
        run: |
          set -euo pipefail
          jf rt ping
          conan profile detect --force
          CONAN_REMOTE_URL="${JF_URL%/}/artifactory/api/conan/${CONAN_VIRTUAL_REPO_KEY}"
          conan remote add jfrog-conan "$CONAN_REMOTE_URL" --force
          conan remote login jfrog-conan "${OIDC_USER}" -p "${OIDC_TOKEN}"
      - name: Resolve Conan dependencies (Artifactory → ConanCenter)
        run: |
          set -euo pipefail
          jf conan install . --profile:build=default --profile:host=default \
            -s build_type=Release --build=missing -r jfrog-conan
      # Build Info is published only from package-binary (`jf conan install --build-name` there). Always pass
      # `-r jfrog-conan` so resolution (and Build Info modules) point at Artifactory, not ConanCenter directly.

  build:
    name: build
    needs: [resolve-dependencies]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Conan
        run: pip install "conan~=2.0"
      - name: Set up JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        id: jfrog
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JF_OIDC_AUDIENCE }}
      - name: Configure Conan remote
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
          OIDC_USER: ${{ steps.jfrog.outputs['oidc-user'] }}
          OIDC_TOKEN: ${{ steps.jfrog.outputs['oidc-token'] }}
        run: |
          set -euo pipefail
          jf rt ping
          conan profile detect --force
          CONAN_REMOTE_URL="${JF_URL%/}/artifactory/api/conan/${CONAN_VIRTUAL_REPO_KEY}"
          conan remote add jfrog-conan "$CONAN_REMOTE_URL" --force
          conan remote login jfrog-conan "${OIDC_USER}" -p "${OIDC_TOKEN}"
      - name: Install Conan deps (Artifactory)
        run: |
          set -euo pipefail
          jf conan install . --profile:build=default --profile:host=default \
            -s build_type=Release --build=missing -r jfrog-conan
      # Git + CI environment are attached at `jf rt build-publish` in package-binary (--collect-git-info / --collect-env).
      - name: Configure & build (CMake preset conan-release)
        run: |
          set -euo pipefail
          cmake --version
          cmake --preset conan-release
          cmake --build --preset conan-release
      - name: Upload pixelfrog binary
        uses: actions/upload-artifact@v4
        with:
          name: pixelfrog-binary
          path: build/Release/pixelfrog

  test:
    name: test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Conan
        run: pip install "conan~=2.0"
      - name: Set up JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        id: jfrog
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JF_OIDC_AUDIENCE }}
      - name: Configure Conan remote
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
          OIDC_USER: ${{ steps.jfrog.outputs['oidc-user'] }}
          OIDC_TOKEN: ${{ steps.jfrog.outputs['oidc-token'] }}
        run: |
          set -euo pipefail
          jf rt ping
          conan profile detect --force
          CONAN_REMOTE_URL="${JF_URL%/}/artifactory/api/conan/${CONAN_VIRTUAL_REPO_KEY}"
          conan remote add jfrog-conan "$CONAN_REMOTE_URL" --force
          conan remote login jfrog-conan "${OIDC_USER}" -p "${OIDC_TOKEN}"
      - name: Install deps & build tests
        run: |
          set -euo pipefail
          jf conan install . --profile:build=default --profile:host=default \
            -s build_type=Release --build=missing -r jfrog-conan
          cmake --preset conan-release
          cmake --build --preset conan-release
      - name: Run tests (JUnit XML)
        run: |
          set -euo pipefail
          mkdir -p test-results
          ./build/Release/pixelfrog_tests -r JUnit::out=test-results/pixelfrog-tests.xml
      # Test-only deps (e.g. Catch2) are already in the graph from `jf conan install` with this conanfile.
      - name: Upload JUnit
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml
          path: test-results/pixelfrog-tests.xml

  security-scan:
    name: security-scan
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Conan
        run: pip install "conan~=2.0"
      - name: Set up JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        id: jfrog
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JF_OIDC_AUDIENCE }}
      - name: Configure Conan remote
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
          OIDC_USER: ${{ steps.jfrog.outputs['oidc-user'] }}
          OIDC_TOKEN: ${{ steps.jfrog.outputs['oidc-token'] }}
        run: |
          set -euo pipefail
          jf rt ping
          conan profile detect --force
          CONAN_REMOTE_URL="${JF_URL%/}/artifactory/api/conan/${CONAN_VIRTUAL_REPO_KEY}"
          conan remote add jfrog-conan "$CONAN_REMOTE_URL" --force
          conan remote login jfrog-conan "${OIDC_USER}" -p "${OIDC_TOKEN}"
      - name: Prepare workspace for scan
        run: |
          set -euo pipefail
          conan install . --profile:build=default --profile:host=default \
            -s build_type=Release --build=missing -r jfrog-conan
      - name: Xray scan workspace (SCA)
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p sarif
          jf scan . --format sarif --fail=false --recursive > sarif/pixelfrog-xray.sarif
      - name: Audit conanfile / sources
        continue-on-error: true
        run: |
          set -euo pipefail
          jf audit --fail=false --format table || true
      - name: Upload SARIF to GitHub Advanced Security
        if: hashFiles('sarif/pixelfrog-xray.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif/pixelfrog-xray.sarif

  package-binary:
    name: package-binary
    needs: [security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Conan
        run: pip install "conan~=2.0"
      - name: Set up JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        id: jfrog
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JF_OIDC_AUDIENCE }}
      - name: Configure Conan remote
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
          OIDC_USER: ${{ steps.jfrog.outputs['oidc-user'] }}
          OIDC_TOKEN: ${{ steps.jfrog.outputs['oidc-token'] }}
        run: |
          set -euo pipefail
          jf rt ping
          conan profile detect --force
          CONAN_REMOTE_URL="${JF_URL%/}/artifactory/api/conan/${CONAN_VIRTUAL_REPO_KEY}"
          conan remote add jfrog-conan "$CONAN_REMOTE_URL" --force
          conan remote login jfrog-conan "${OIDC_USER}" -p "${OIDC_TOKEN}"
          CONAN_LOCAL_URL="${JF_URL%/}/artifactory/api/conan/${CONAN_LOCAL_REPO_KEY}"
          conan remote add jfrog-conan-deploy "$CONAN_LOCAL_URL" --force
          conan remote login jfrog-conan-deploy "${OIDC_USER}" -p "${OIDC_TOKEN}"
      - name: Collect Conan for Build Info (jf conan)
        env:
          JFROG_BUILD_NUMBER: ${{ github.run_number }}
          JF_PROJECT_KEY: ${{ vars.JF_PROJECT_KEY }}
        run: |
          set -euo pipefail
          mkdir -p staging
          EXTRA=( )
          if [ -n "${JF_PROJECT_KEY:-}" ]; then EXTRA+=(--project="${JF_PROJECT_KEY}"); fi
          # -r jfrog-conan is required: without it, Conan may use conancenter first and Build Info / Xray only see
          # generic uploads → one-component SBOM and "Partial" scan (artifacts not in your indexed repos).
          jf conan install . --profile:build=default --profile:host=default \
            -s build_type=Release --build=missing -r jfrog-conan \
            --build-name="${{ env.JFROG_BUILD_NAME }}" \
            --build-number="${{ env.JFROG_BUILD_NUMBER }}" \
            --module=conan \
            "${EXTRA[@]}"
      # Upload must target a LOCAL Conan repo API URL — virtual returns 400 without "default deployment repository".
      - name: Upload Conan cache to Artifactory (Xray / build SBOM)
        if: vars.JF_CONAN_PUBLISH_DEPS == 'true'
        env:
          JFROG_BUILD_NUMBER: ${{ github.run_number }}
          JF_PROJECT_KEY: ${{ vars.JF_PROJECT_KEY }}
        run: |
          set -euo pipefail
          conan list "*:*" -c --format=json --out-file=staging/conan-upload-list.json
          EXTRA=( )
          if [ -n "${JF_PROJECT_KEY:-}" ]; then EXTRA+=(--project="${JF_PROJECT_KEY}"); fi
          jf conan upload -l staging/conan-upload-list.json -r jfrog-conan-deploy --confirm \
            --build-name="${{ env.JFROG_BUILD_NAME }}" \
            --build-number="${{ env.JFROG_BUILD_NUMBER }}" \
            "${EXTRA[@]}"
      - name: CycloneDX SBOM (full SCA component list for Xray / demos)
        continue-on-error: true
        run: |
          set -euo pipefail
          if jf audit --format=cyclonedx --sbom --sca --without-contextual-analysis --fail=false \
            > staging/pixelfrog-sbom.cdx.json 2>/dev/null && [ -s staging/pixelfrog-sbom.cdx.json ]; then
            echo "SBOM written ($(wc -c < staging/pixelfrog-sbom.cdx.json) bytes)"
          else
            rm -f staging/pixelfrog-sbom.cdx.json
            echo "jf audit CycloneDX skipped or empty (Advanced Security / project context may be required)"
          fi
      - name: Generate manifest
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          set -euo pipefail
          conan graph info . -r jfrog-conan -s build_type=Release --format=json > graph-info.json
          python3 scripts/ci_write_manifest.py staging/manifest.json
      - name: Download built binary
        uses: actions/download-artifact@v4
        with:
          name: pixelfrog-binary
          path: staging
      - name: Upload generic artifacts & publish build info
        env:
          JFROG_BUILD_NUMBER: ${{ github.run_number }}
          JF_PROJECT_KEY: ${{ vars.JF_PROJECT_KEY }}
          BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          chmod +x staging/pixelfrog || true
          jf rt upload "staging/pixelfrog" \
            "mwpf-generic-local/pixelfrog/${{ github.run_number }}/pixelfrog" \
            --build-name="${{ env.JFROG_BUILD_NAME }}" \
            --build-number="${{ env.JFROG_BUILD_NUMBER }}"
          jf rt upload "staging/manifest.json" \
            "mwpf-generic-local/pixelfrog/${{ github.run_number }}/manifest.json" \
            --build-name="${{ env.JFROG_BUILD_NAME }}" \
            --build-number="${{ env.JFROG_BUILD_NUMBER }}"
          if [ -f staging/pixelfrog-sbom.cdx.json ]; then
            jf rt upload "staging/pixelfrog-sbom.cdx.json" \
              "mwpf-generic-local/pixelfrog/${{ github.run_number }}/pixelfrog-sbom.cdx.json" \
              --build-name="${{ env.JFROG_BUILD_NAME }}" \
              --build-number="${{ env.JFROG_BUILD_NUMBER }}"
          fi
          EXTRA=( )
          if [ -n "${JF_PROJECT_KEY:-}" ]; then EXTRA+=(--project="${JF_PROJECT_KEY}"); fi
          jf rt build-publish "${{ env.JFROG_BUILD_NAME }}" "${{ env.JFROG_BUILD_NUMBER }}" \
            --collect-env=true \
            --collect-git-info=true \
            --dot-git-path="${{ github.workspace }}/.git" \
            --build-url="${BUILD_URL}" \
            "${EXTRA[@]}"

  release-bundle:
    name: release-bundle
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [package-binary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JF_OIDC_AUDIENCE }}
      - name: Verify JFrog
        run: |
          set -euo pipefail
          jf rt ping
      - name: Create & promote Release Bundle v2
        env:
          JFROG_BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          RB_VER="1.0.${{ github.run_number }}"
          jf release-bundle-create pixelfrog-rb "${RB_VER}" \
            --sync=true \
            --build-name="${{ env.JFROG_BUILD_NAME }}" \
            --build-number="${{ env.JFROG_BUILD_NUMBER }}" \
            || echo "release-bundle-create skipped or failed (configure Distribution / Release Lifecycle in SaaS)"
          jf release-bundle-promote pixelfrog-rb "${RB_VER}" staging \
            --promotion-type=copy --sync=true \
            || echo "release-bundle-promote skipped (create environment 'staging' in JFrog)"
