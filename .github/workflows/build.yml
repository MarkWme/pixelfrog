name: build

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  JFROG_BUILD_NAME: pixelfrog
  PYTHON_VERSION: "3.11"
  # Conan remote + conan art:build-info repo probe (must match your Artifactory virtual key).
  CONAN_VIRTUAL_REPO_KEY: ${{ vars.JF_CONAN_VIRTUAL_REPO || 'mwpf-conan-virtual-dev' }}

jobs:
  setup:
    name: setup
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Conan
        run: pip install "conan~=2.0"
      - name: Set up JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JF_OIDC_AUDIENCE }}
      - name: Verify JFrog and Conan
        run: |
          set -euo pipefail
          jf rt ping
          conan --version

  resolve-dependencies:
    name: resolve-dependencies
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Conan
        run: pip install "conan~=2.0"
      - name: Set up JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        id: jfrog
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JF_OIDC_AUDIENCE }}
      - name: Configure Conan remote
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
          OIDC_USER: ${{ steps.jfrog.outputs['oidc-user'] }}
          OIDC_TOKEN: ${{ steps.jfrog.outputs['oidc-token'] }}
        run: |
          set -euo pipefail
          jf rt ping
          conan profile detect --force
          CONAN_REMOTE_URL="${JF_URL%/}/artifactory/api/conan/${CONAN_VIRTUAL_REPO_KEY}"
          conan remote add jfrog-conan "$CONAN_REMOTE_URL" --force
          conan remote login jfrog-conan "${OIDC_USER}" -p "${OIDC_TOKEN}"
      - name: Resolve Conan dependencies (Artifactory → ConanCenter)
        env:
          JFROG_BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          jf conan install . --profile:build=default --profile:host=default \
            -s build_type=Release --build=missing \
            --build-name="${{ env.JFROG_BUILD_NAME }}" \
            --build-number="${{ env.JFROG_BUILD_NUMBER }}"
      # Conan deps in Build Info: prefer `conan art:build-info` in package-binary when JF_CONAN_ART_LOCAL_REPO is set;
      # otherwise `jf conan install --build-name` (package-binary). Do not use build-add-dependencies on graph-info.json.

  build:
    name: build
    needs: [resolve-dependencies]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Conan
        run: pip install "conan~=2.0"
      - name: Set up JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        id: jfrog
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JF_OIDC_AUDIENCE }}
      - name: Configure Conan remote
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
          OIDC_USER: ${{ steps.jfrog.outputs['oidc-user'] }}
          OIDC_TOKEN: ${{ steps.jfrog.outputs['oidc-token'] }}
        run: |
          set -euo pipefail
          jf rt ping
          conan profile detect --force
          CONAN_REMOTE_URL="${JF_URL%/}/artifactory/api/conan/${CONAN_VIRTUAL_REPO_KEY}"
          conan remote add jfrog-conan "$CONAN_REMOTE_URL" --force
          conan remote login jfrog-conan "${OIDC_USER}" -p "${OIDC_TOKEN}"
      - name: Install Conan deps and collect build info
        env:
          JFROG_BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          jf conan install . --profile:build=default --profile:host=default \
            -s build_type=Release --build=missing \
            --build-name="${{ env.JFROG_BUILD_NAME }}" \
            --build-number="${{ env.JFROG_BUILD_NUMBER }}"
      # Git + CI environment are attached at `jf rt build-publish` in package-binary (--collect-git-info / --collect-env).
      - name: Configure & build (CMake preset conan-release)
        run: |
          set -euo pipefail
          cmake --version
          cmake --preset conan-release
          cmake --build --preset conan-release
      - name: Upload pixelfrog binary
        uses: actions/upload-artifact@v4
        with:
          name: pixelfrog-binary
          path: build/Release/pixelfrog

  test:
    name: test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Conan
        run: pip install "conan~=2.0"
      - name: Set up JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        id: jfrog
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JF_OIDC_AUDIENCE }}
      - name: Configure Conan remote
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
          OIDC_USER: ${{ steps.jfrog.outputs['oidc-user'] }}
          OIDC_TOKEN: ${{ steps.jfrog.outputs['oidc-token'] }}
        run: |
          set -euo pipefail
          jf rt ping
          conan profile detect --force
          CONAN_REMOTE_URL="${JF_URL%/}/artifactory/api/conan/${CONAN_VIRTUAL_REPO_KEY}"
          conan remote add jfrog-conan "$CONAN_REMOTE_URL" --force
          conan remote login jfrog-conan "${OIDC_USER}" -p "${OIDC_TOKEN}"
      - name: Install deps & build tests
        env:
          JFROG_BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          jf conan install . --profile:build=default --profile:host=default \
            -s build_type=Release --build=missing \
            --build-name="${{ env.JFROG_BUILD_NAME }}" \
            --build-number="${{ env.JFROG_BUILD_NUMBER }}"
          cmake --preset conan-release
          cmake --build --preset conan-release
      - name: Run tests (JUnit XML)
        run: |
          set -euo pipefail
          mkdir -p test-results
          ./build/Release/pixelfrog_tests -r JUnit::out=test-results/pixelfrog-tests.xml
      # Test-only deps (e.g. Catch2) are already in the graph from `jf conan install` with this conanfile.
      - name: Upload JUnit
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml
          path: test-results/pixelfrog-tests.xml

  security-scan:
    name: security-scan
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Conan
        run: pip install "conan~=2.0"
      - name: Set up JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        id: jfrog
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JF_OIDC_AUDIENCE }}
      - name: Configure Conan remote
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
          OIDC_USER: ${{ steps.jfrog.outputs['oidc-user'] }}
          OIDC_TOKEN: ${{ steps.jfrog.outputs['oidc-token'] }}
        run: |
          set -euo pipefail
          jf rt ping
          conan profile detect --force
          CONAN_REMOTE_URL="${JF_URL%/}/artifactory/api/conan/${CONAN_VIRTUAL_REPO_KEY}"
          conan remote add jfrog-conan "$CONAN_REMOTE_URL" --force
          conan remote login jfrog-conan "${OIDC_USER}" -p "${OIDC_TOKEN}"
      - name: Prepare workspace for scan
        run: |
          set -euo pipefail
          conan install . --profile:build=default --profile:host=default \
            -s build_type=Release --build=missing
      - name: Xray scan workspace (SCA)
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p sarif
          jf scan . --format sarif --fail=false --recursive > sarif/pixelfrog-xray.sarif
      - name: Audit conanfile / sources
        continue-on-error: true
        run: |
          set -euo pipefail
          jf audit --fail=false --format table || true
      - name: Upload SARIF to GitHub Advanced Security
        if: hashFiles('sarif/pixelfrog-xray.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif/pixelfrog-xray.sarif

  package-binary:
    name: package-binary
    needs: [security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Conan
        run: pip install "conan~=2.0"
      - name: Set up JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        id: jfrog
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JF_OIDC_AUDIENCE }}
      - name: Configure Conan remote
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
          OIDC_USER: ${{ steps.jfrog.outputs['oidc-user'] }}
          OIDC_TOKEN: ${{ steps.jfrog.outputs['oidc-token'] }}
        run: |
          set -euo pipefail
          jf rt ping
          conan profile detect --force
          CONAN_REMOTE_URL="${JF_URL%/}/artifactory/api/conan/${CONAN_VIRTUAL_REPO_KEY}"
          conan remote add jfrog-conan "$CONAN_REMOTE_URL" --force
          conan remote login jfrog-conan "${OIDC_USER}" -p "${OIDC_TOKEN}"
      - name: Conan graph JSON + optional Art Build Info (conan-extensions art)
        env:
          JFROG_BUILD_NUMBER: ${{ github.run_number }}
          OIDC_USER: ${{ steps.jfrog.outputs['oidc-user'] }}
          OIDC_TOKEN: ${{ steps.jfrog.outputs['oidc-token'] }}
          JF_URL: ${{ vars.JF_URL }}
          JF_CONAN_ART_LOCAL_REPO: ${{ vars.JF_CONAN_ART_LOCAL_REPO }}
          JF_CONAN_ART_REPO_EXTRA: ${{ vars.JF_CONAN_ART_REPO_EXTRA }}
          JF_PROJECT_KEY: ${{ vars.JF_PROJECT_KEY }}
          BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p staging
          if [ -n "${JF_CONAN_ART_LOCAL_REPO:-}" ]; then
            conan config install https://github.com/conan-io/conan-extensions.git \
              -sf=extensions/commands/art -tf=extensions/commands/art
            conan art:server remove pixelfrog-art 2>/dev/null || true
            ART_BASE="${JF_URL%/}/artifactory"
            conan art:server add pixelfrog-art "${ART_BASE}" \
              --user="${OIDC_USER}" --token="${OIDC_TOKEN}"
            conan install . --profile:build=default --profile:host=default \
              -s build_type=Release --build=missing -r jfrog-conan \
              --format=json > conan-install.json
            # conan-extensions: with a SINGLE repository, every artifact is assumed to live there (no manifest
            # probe). Dependencies pulled via the virtual repo usually live under virtual/remote cache, not
            # only the local repo — prepend virtual first so _get_origin_repo finds conanmanifest.txt.
            REPOS=( "${CONAN_VIRTUAL_REPO_KEY}" "${JF_CONAN_ART_LOCAL_REPO}" )
            if [ -n "${JF_CONAN_ART_REPO_EXTRA:-}" ]; then
              for r in ${JF_CONAN_ART_REPO_EXTRA}; do
                dup=0
                for existing in "${REPOS[@]}"; do
                  [ "$r" = "$existing" ] && dup=1 && break
                done
                [ "$dup" -eq 0 ] && REPOS+=( "$r" )
              done
            fi
            conan art:build-info create conan-install.json \
              "${{ env.JFROG_BUILD_NAME }}" "${{ env.JFROG_BUILD_NUMBER }}" \
              "${REPOS[@]}" \
              --server pixelfrog-art \
              --with-dependencies \
              --add-cached-deps \
              --build-url="${BUILD_URL}" \
              > staging/pixelfrog-conan-buildinfo.json
            UPLOAD_ARGS=( --server pixelfrog-art )
            if [ -n "${JF_PROJECT_KEY:-}" ]; then
              UPLOAD_ARGS+=( --project="${JF_PROJECT_KEY}" )
            fi
            UPLOAD_ARGS+=( staging/pixelfrog-conan-buildinfo.json )
            conan art:build-info upload "${UPLOAD_ARGS[@]}"
          else
            echo "::notice::JF_CONAN_ART_LOCAL_REPO unset — using jf conan install for Build Info Conan modules. Set the variable to your Conan LOCAL repo key for conan art:build-info (see README)."
            jf conan install . --profile:build=default --profile:host=default \
              -s build_type=Release --build=missing \
              --build-name="${{ env.JFROG_BUILD_NAME }}" \
              --build-number="${{ env.JFROG_BUILD_NUMBER }}"
          fi
      - name: CycloneDX SBOM (full SCA component list for Xray / demos)
        continue-on-error: true
        run: |
          set -euo pipefail
          if jf audit --format=cyclonedx --sbom --sca --without-contextual-analysis --fail=false \
            > staging/pixelfrog-sbom.cdx.json 2>/dev/null && [ -s staging/pixelfrog-sbom.cdx.json ]; then
            echo "SBOM written ($(wc -c < staging/pixelfrog-sbom.cdx.json) bytes)"
          else
            rm -f staging/pixelfrog-sbom.cdx.json
            echo "jf audit CycloneDX skipped or empty (Advanced Security / project context may be required)"
          fi
      - name: Generate manifest
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          set -euo pipefail
          conan graph info . -s build_type=Release --format=json > graph-info.json
          python3 scripts/ci_write_manifest.py staging/manifest.json
      - name: Download built binary
        uses: actions/download-artifact@v4
        with:
          name: pixelfrog-binary
          path: staging
      - name: Upload generic artifacts & publish build info
        env:
          JFROG_BUILD_NUMBER: ${{ github.run_number }}
          JF_PROJECT_KEY: ${{ vars.JF_PROJECT_KEY }}
          BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          chmod +x staging/pixelfrog || true
          jf rt upload "staging/pixelfrog" \
            "mwpf-generic-local/pixelfrog/${{ github.run_number }}/pixelfrog" \
            --build-name="${{ env.JFROG_BUILD_NAME }}" \
            --build-number="${{ env.JFROG_BUILD_NUMBER }}"
          jf rt upload "staging/manifest.json" \
            "mwpf-generic-local/pixelfrog/${{ github.run_number }}/manifest.json" \
            --build-name="${{ env.JFROG_BUILD_NAME }}" \
            --build-number="${{ env.JFROG_BUILD_NUMBER }}"
          if [ -f staging/pixelfrog-sbom.cdx.json ]; then
            jf rt upload "staging/pixelfrog-sbom.cdx.json" \
              "mwpf-generic-local/pixelfrog/${{ github.run_number }}/pixelfrog-sbom.cdx.json" \
              --build-name="${{ env.JFROG_BUILD_NAME }}" \
              --build-number="${{ env.JFROG_BUILD_NUMBER }}"
          fi
          EXTRA=( )
          if [ -n "${JF_PROJECT_KEY:-}" ]; then EXTRA+=(--project="${JF_PROJECT_KEY}"); fi
          jf rt build-publish "${{ env.JFROG_BUILD_NAME }}" "${{ env.JFROG_BUILD_NUMBER }}" \
            --collect-env=true \
            --collect-git-info=true \
            --dot-git-path="${{ github.workspace }}/.git" \
            --build-url="${BUILD_URL}" \
            "${EXTRA[@]}"

  release-bundle:
    name: release-bundle
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [package-binary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JF_OIDC_AUDIENCE }}
      - name: Verify JFrog
        run: |
          set -euo pipefail
          jf rt ping
      - name: Create & promote Release Bundle v2
        env:
          JFROG_BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          RB_VER="1.0.${{ github.run_number }}"
          jf release-bundle-create pixelfrog-rb "${RB_VER}" \
            --sync=true \
            --build-name="${{ env.JFROG_BUILD_NAME }}" \
            --build-number="${{ env.JFROG_BUILD_NUMBER }}" \
            || echo "release-bundle-create skipped or failed (configure Distribution / Release Lifecycle in SaaS)"
          jf release-bundle-promote pixelfrog-rb "${RB_VER}" staging \
            --promotion-type=copy --sync=true \
            || echo "release-bundle-promote skipped (create environment 'staging' in JFrog)"
